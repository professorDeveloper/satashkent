name: satashkent_task
description: "SATashkent mobile client."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  flutter_bloc: ^9.1.1
  equatable: ^2.0.7
  dio: ^5.7.0
  pretty_dio_logger: ^1.4.0
  go_router: ^14.6.2
  get_it: ^8.0.3
  shared_preferences: ^2.3.4
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.16
  flutter_html: ^3.0.0-beta.2
  flutter_math_fork: ^0.7.4
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0
  intl: ^0.20.2
  path_drawing: ^1.0.1
  easy_localization: ^3.0.8
  share_plus: ^12.0.2
  image_picker: ^1.2.2
  image_cropper: ^12.2.1
  lottie: ^3.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.9.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/translations/
    - assets/lotties/
