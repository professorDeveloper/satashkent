name: satashkent_task
description: "SATashkent mobile client."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7

  # HTTP / networking
  dio: ^5.7.0
  pretty_dio_logger: ^1.4.0

  # Routing
  go_router: ^14.6.2

  # DI
  get_it: ^8.0.3

  # Local storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.4
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Env
  flutter_dotenv: ^5.2.1

  # UI helpers
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.16
  flutter_html: ^3.0.0-beta.2
  flutter_math_fork: ^0.7.4
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0

  # Utils
  intl: ^0.20.2
  jwt_decoder: ^2.0.1
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  path_drawing: ^1.0.1
  easy_localization: ^3.0.8
  share_plus: ^12.0.2
  image_picker: ^1.2.2
  image_cropper: ^12.2.1
  lottie: ^3.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.9.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
    - assets/icons/
    - assets/translations/
    - assets/lotties/
